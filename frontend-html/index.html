<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotesTakingPlatform</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <div style="display: flex; justify-content: space-between; padding: 0px 100px;">
        <div id="notes">
            Notes Will store Here ...
        </div>
        <div>
            <input type="text" id="userNote" />
            <button onclick="postNotes()">Create New Notes</button>
        </div>
    </div>
    <script>
        async function postNotes(){
            await axios.post("http://localhost:2005/notes", {
                note : document.getElementById("userNote").value
            })

            const newNode = document.createElement("div")
            newNode.innerHTML = document.getElementById("userNote").value
            newNode.setAttribute("style","border: 2px solid black; padding :10px")
            document.getElementById("notes").append(newNode)
        }
        async function NotesDisplay(){
            const response = await axios.get("http://localhost:2005/notes")

                const noteNotes = document.createElement("div")
                noteNotes.innerHTML = notes[i]
                noteNotes.setAttribute("style","border:2px solid black; padding:10px;")
                document.getElementById("notes").appendChild(noteNotes)
            }
        }
        NotesDisplay();
    </script>
</body>
</html>
